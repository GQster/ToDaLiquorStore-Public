# --- 🐰 EASTER Mode ---
appTitle: "🐰 To Da Egg Hunt!"
searchingText: "Finding eggs..."
themeOverride: "EASTER" # Uses Pastel background
overpassQuery: "[out:json][timeout:25];(nwr(around:$radiusMeters,$lat,$lng)[\"leisure\"=\"park\"];);out center;"
nominatimTerms: ["park", "garden"]
searchKeywords: ["park", "garden", "flowers"]


# ---------------------------------------------------------
# GLOBAL SETTINGS (Applied to all modes)
# ---------------------------------------------------------
minVersion: 1
forceUpdateUrl: "https://play.google.com/store/apps/details?id=com.GQsWorks.ToDaLiquorStore"
