# To Da Liquor Store! Remote Configuration
# =======================================
# This file allows dynamic overrides for search queries, titles, and themes.
# Note: YAML uses the LAST occurrence of a key if duplicates exist. 
# For best results, comment out the unused mode entirely!

# ---------------------------------------------------------
# CURRENT MODE (Enabled)
# ---------------------------------------------------------

# --- 💪 To Da GYM! Mode ---
appTitle: "💪 To Da GYM!"
searchingText: "Finding gainz..."
overpassQuery: "[out:json][timeout:25];(nwr(around:$radiusMeters,$lat,$lng)[\"leisure\"=\"fitness_centre\"];);out center;"
nominatimTerms: ["fitness center", "gym", "crossfit"]
searchKeywords: ["gym", "fitness", "crossfit", "training"]

